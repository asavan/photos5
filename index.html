<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 photos</title>
<style>
        /* Загрузка оригинального Impact */
        @font-face {
            font-family: 'Impact Web';
            src: url('https://gstatic.com') format('woff2');
            font-weight: bold;
            font-style: normal;
        }

        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Блокируем скролл на уровне всей страницы */
        html, body {
            width: 100%;
            height: 100%;
            background-color: #111;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ПЛАКАТ НА ВЕСЬ ЭКРАН */
        .poster {
            width: 100vw;
            height: 100vh;
			max-width: 420px;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            /* Желтая рамка прижата точно к краям экрана */
            border: 12px solid #ffcc00; 
            position: relative;
            /* Внутренние отступы зависят от высоты экрана, чтобы контент не вылезал */
            padding: 4vh 4vw; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
        }

        /* Адаптация для десктопов: если экран слишком широкий (не телефон), 
           сохраняем пропорции мобильного экрана по центру */
        @media (min-aspect-ratio: 2/3) {
            .poster {
                width: calc(100vh * 2 / 3);
                height: 100vh;
                border-radius: 0;
            }
        }

        /* Бильярдное сукно на фоне */
        .poster::before {
            content: '';
            position: absolute;
            top: 25%;
            left: -10%;
            width: 120%;
            height: 50%;
            background: #005c33;
            transform: rotate(-3deg);
            border-top: 5px solid #00ff66;
            border-bottom: 5px solid #00ff66;
            opacity: 0.8;
            z-index: 1;
        }

        /* Розовая неоновая вывеска */
        .neon-sign {
            position: absolute;
            top: 15px;
            left: 15px;
            border: 2px solid #ff0055;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 9px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 5px #ff0055, 0 0 10px #ff0055;
            box-shadow: 0 0 8px #ff0055, inset 0 0 5px #ff0055;
            transform: rotate(-10deg);
            line-height: 1.2;
            text-align: center;
            z-index: 3;
        }

        /* Логотип */
        .logo-area {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 2vh;
        }

        .logo-top {
            font-size: 12px;
            color: #ffcc00;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Oswald', sans-serif;
        }

        .logo-main {
            font-family: 'Impact Web', 'Impact', sans-serif;
            font-weight: 900;
            font-size: 30px;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #ff0000, 5px 5px 0px #000;
            letter-spacing: 1px;
            line-height: 1;
        }

        .logo-sub {
            font-size: 16px;
            color: #00ffcc;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
            font-family: 'Oswald', sans-serif;
        }

        /* Блок предложения */
        .promo-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            transform: rotate(-3deg) skewX(-2deg);
            margin: auto 0; /* Центрирует блок между шапкой и подвалом */
        }

        .text-big {
            font-family: 'Impact Web', 'Impact', sans-serif;
            font-weight: 900;
            font-size: 60px;
            color: #ffcc00;
            text-transform: uppercase;
            line-height: 0.95;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 10px rgba(0,0,0,0.8);
        }

        .text-white {
            color: #ffffff;
			font-size: 36px;
        }

        .text-plus {
            font-size: 32px;
            color: #ff0055;
            margin: 1px 0;
            font-weight: 700;
            text-shadow: 3px 3px 0 #000;
        }

        /* КРАСНАЯ ПЛАШКА ЦЕНЫ */
        .price-container {
            position: relative;
            z-index: 3;
            margin-top: 2vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: rotate(-4deg) skewX(-6deg) scale(1.05);
            filter: drop-shadow(5px 5px 0px rgba(0, 0, 0, 0.9));
        }

        .splash-bg {
            position: absolute;
            width: 115%;
            height: 145%;
            z-index: 1;
            pointer-events: none;
        }

        .price-text {
            position: relative;
            z-index: 2;
            font-family: 'Impact Web', 'Impact', sans-serif;
            font-weight: 900;
            font-size: 70px;
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            line-height: 0.9;
            padding-top: 5px;
        }

        .price-only {
            position: relative;
            z-index: 2;
            font-family: 'Impact Web', 'Impact', sans-serif;
            font-weight: 900;
            font-size: 28px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1;
            margin-top: -2px;
            padding-bottom: 5px;
        }

        /* Информационный блок */
        .footer-info {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #444;
            margin-bottom: 2vh; /* Оставляет место до желтой нижней рамки */
        }

        .pool-only {
            background: #00ff66;
            color: #000;
            padding: 4px 10px;
            font-weight: 700;
            font-size: clamp(9px, 2.5vw, 12px);
            text-align: left;
            border-radius: 3px;
            line-height: 1.2;
            box-shadow: 0 0 10px rgba(0,255,102,0.3);
            font-family: 'Oswald', sans-serif;
        }

        .pool-only span {
            font-size: clamp(16px, 4.5vw, 22px);
            display: block;
        }

        .hours {
            color: #ffcc00;
            text-align: right;
            font-size: 10px;
            font-weight: 700;
            line-height: 1.3;
            font-family: 'Oswald', sans-serif;
        }

        .hours span {
            color: #fff;
            font-size: clamp(11px, 3vw, 14px);
            display: block;
        }

        /* Желтая плашка в самом низу, прижатая к внутренней стороне рамки */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffcc00;
            color: #000;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 2px 0;
            z-index: 4;
            font-family: 'Oswald', sans-serif;
        }
    </style>
</head>
<body>

    <div class="poster">
        <!-- Неоновая вывеска -->
        <div class="neon-sign">+ Free smile</div>

        <!-- Логотип -->
        <div class="logo-area">
            <div class="logo-top">— THE —</div>
            <div class="logo-main">Memories</div>
            <div class="logo-sub">company</div>
        </div>

        <!-- Рекламное предложение -->
        <div class="promo-content">
            <div class="text-big">5 PHOTOS</div>
            <div class="text-big text-white">on your phone</div>
            <div class="text-plus">or</div>
            <div class="text-big">1 VIDEO</div>
            <div class="text-big text-white">up to 4 min</div>
            
            <!-- Блок цены с реалистичным рваным SVG-эффектом -->
            <div class="price-container">
                <!-- Векторная подложка рваной кисти с шумом -->
                <svg class="splash-bg" viewBox="0 0 200 70" preserveAspectRatio="none">
                    <defs>
                        <!-- Специальный фильтр, который разрывает края вектора мелкими зазубринами и каплями -->
                        <filter id="grunge-edges">
                            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves = "3" result="noise" />
                            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
                        </filter>
                        <!-- Градиент как на плакате -->
                        <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ff1a1a;" />
                            <stop offset="100%" style="stop-color:#b30000;" />
                        </linearGradient>
                    </defs>
                    <!-- Базовая фигура плашки, которая будет искажена фильтром -->
                    <rect x="10" y="8" width="180" height="54" fill="url(#red-grad)" filter="url(#grunge-edges)" />
                </svg>
                
                <!-- Текст цены -->
                <span class="price-text">20K vnd</span>
                <!-- Новая строчка ONLY -->
                <span class="price-only">ONLY</span>
            </div>
        </div>

        <!-- Декоративная плашка -->
        <div class="bottom-bar">
            have a nice day
        </div>
    </div>

</body>
</html>
