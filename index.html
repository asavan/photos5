<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5 photos</title>
    <style>
        /* Принудительно загружаем оригинальный Impact для Android и iOS устройств */
        @font-face {
            font-family: 'Impact Web';
            src: url('https://gstatic.com') format('woff2'),
                 url('https://cloudflare.com') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        @import url('https://googleapis.com');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            font-family: 'Oswald', sans-serif;
        }

        /* Контейнер плаката */
        .poster {
            width: 100%;
            max-width: 420px;
            aspect-ratio: 2 / 3;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            border: 8px solid #ffcc00;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        /* Бильярдное сукно на фоне */
        .poster::before {
            content: '';
            position: absolute;
            top: 28%;
            left: -10%;
            width: 120%;
            height: 52%;
            background: #005c33;
            transform: rotate(-3deg);
            border-top: 5px solid #00ff66;
            border-bottom: 5px solid #00ff66;
            opacity: 0.8;
            z-index: 1;
        }

        /* Розовая неоновая вывеска */
        .neon-sign {
            position: absolute;
            top: 15px;
            left: 15px;
            border: 2px solid #ff0055;
            padding: 6px;
            border-radius: 5px;
            font-size: 10px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 5px #ff0055, 0 0 10px #ff0055, 0 0 15px #ff0055;
            box-shadow: 0 0 8px #ff0055, inset 0 0 5px #ff0055;
            transform: rotate(-10deg);
            line-height: 1.2;
            text-align: center;
            z-index: 3;
        }

        /* Логотип */
        .logo-area {
            position: relative;
            z-index: 2;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .logo-top {
            font-size: 14px;
            color: #ffcc00;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo-main {
            font-family: 'Impact Web', 'Impact', sans-serif; /* Подключаем скачанный Impact */
            font-weight: 900;
            font-size: clamp(34px, 8.5vw, 44px);
            color: #fff;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px #ff0000, 6px 6px 0px #000;
            letter-spacing: 1px;
        }

        .logo-sub {
            font-size: 18px;
            color: #00ffcc;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Блок текстового предложения с наклоном */
        .promo-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            transform: rotate(-3deg) skewX(-2deg);
        }

        .text-big {
            font-family: 'Impact Web', 'Impact', sans-serif; /* Подключаем скачанный Impact */
            font-weight: 900;
            font-size: clamp(36px, 9vw, 52px);
            color: #ffcc00;
            text-transform: uppercase;
            line-height: 0.95;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, 4px 4px 10px rgba(0,0,0,0.8);
        }

        .text-white {
            color: #ffffff;
        }

        .text-plus {
            font-size: 36px;
            color: #ff0055;
            margin: 2px 0;
            font-weight: 700;
            text-shadow: 3px 3px 0 #000;
        }

        /* КОНТЕЙНЕР ДЛЯ РВАННОЙ ЦЕНЫ */
        .price-container {
            position: relative;
            z-index: 3;
            margin-top: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transform: rotate(-4deg) skewX(-6deg) scale(1.1);
            filter: drop-shadow(6px 6px 0px rgba(0, 0, 0, 0.9));
        }

        /* SVG фоновый всплеск */
        .splash-bg {
            position: absolute;
            width: 115%;
            height: 145%;
            z-index: 1;
            pointer-events: none;
        }

        /* Сама надпись внутри брызг */
        .price-text {
            position: relative;
            z-index: 2;
            font-family: 'Impact Web', 'Impact', sans-serif; /* Подключаем скачанный Impact */
            font-weight: 900;
            font-size: clamp(54px, 14vw, 76px);
            color: #fff;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0 #000, -1px -1px 0 #000;
            line-height: 0.9;
            padding-top: 5px;
        }

        /* Мелкая надпись ONLY */
        .price-only {
            position: relative;
            z-index: 2;
            font-family: 'Impact Web', 'Impact', sans-serif; /* Подключаем скачанный Impact */
            font-weight: 900;
            font-size: clamp(20px, 5vw, 26px);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0 #000;
            line-height: 1;
            margin-top: -2px;
            padding-bottom: 5px;
        }

        /* Нижний информационный блок */
        .footer-info {
            position: relative;
            z-index: 2;
            margin-top: auto;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
        }

        .pool-only {
            background: #00ff66;
            color: #000;
            padding: 5px 12px;
            font-weight: 700;
            font-size: clamp(10px, 2.5vw, 13px);
            text-align: left;
            border-radius: 3px;
            line-height: 1.2;
            box-shadow: 0 0 10px rgba(0,255,102,0.3);
        }

        .pool-only span {
            font-size: clamp(16px, 4.5vw, 22px);
            display: block;
        }

        .hours {
            color: #ffcc00;
            text-align: right;
            font-size: 11px;
            font-weight: 700;
            line-height: 1.3;
        }

        .hours span {
            color: #fff;
            font-size: clamp(12px, 3vw, 15px);
            display: block;
        }

        /* Декоративная плашка в самом низу */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #ffcc00;
            color: #000;
            text-align: center;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 3px 0;
            z-index: 4;
        }
    </style>
</head>
<body>

    <div class="poster">
        <!-- Неоновая вывеска -->
        <div class="neon-sign">+ Free smile</div>

        <!-- Логотип -->
        <div class="logo-area">
            <div class="logo-top">— THE —</div>
            <div class="logo-main">Memories</div>
            <div class="logo-sub">company</div>
        </div>

        <!-- Рекламное предложение -->
        <div class="promo-content">
            <div class="text-big">5 PHOTOS</div>
            <div class="text-big text-white">on your phone</div>
            <div class="text-plus">or</div>
            <div class="text-big">1 VIDEO</div>
            <div class="text-big text-white">up to 3 min</div>
            
            <!-- Блок цены с реалистичным рваным SVG-эффектом -->
            <div class="price-container">
                <!-- Векторная подложка рваной кисти с шумом -->
                <svg class="splash-bg" viewBox="0 0 200 70" preserveAspectRatio="none">
                    <defs>
                        <!-- Специальный фильтр, который разрывает края вектора мелкими зазубринами и каплями -->
                        <filter id="grunge-edges">
                            <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves = "3" result="noise" />
                            <feDisplacementMap in="SourceGraphic" in2="noise" scale="10" xChannelSelector="R" yChannelSelector="G" />
                        </filter>
                        <!-- Градиент как на плакате -->
                        <linearGradient id="red-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" style="stop-color:#ff1a1a;" />
                            <stop offset="100%" style="stop-color:#b30000;" />
                        </linearGradient>
                    </defs>
                    <!-- Базовая фигура плашки, которая будет искажена фильтром -->
                    <rect x="10" y="8" width="180" height="54" fill="url(#red-grad)" filter="url(#grunge-edges)" />
                </svg>
                
                <!-- Текст цены -->
                <span class="price-text">20K vnd</span>
                <!-- Новая строчка ONLY -->
                <span class="price-only">ONLY</span>
            </div>
        </div>

        <!-- Декоративная плашка -->
        <div class="bottom-bar">
            have a nice day
        </div>
    </div>

</body>
</html>
